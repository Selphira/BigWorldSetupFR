Mod-FR=Ce mod a pour but de rendre les premiĶres heures du jeu plus intķressantes, car certains joueurs se sont peut-Ļtre lassķs de faire les mĻmes quĻtes encore et encore. Il ajoute donc un nouveau quartier dans d'Athkatla : Bord Sud, accessible une fois que vous avez parlķ Ó Gaelan et entendu son offre. La zone n'est pas aussi grande que celle des Bas Quartiers ou du Quartier du pont, mais elle a sa propre quĻte principale (initiķe par une petite-personne nommķe Ma’ro Claqueboue) et une sķrie de mini-quĻtes et de rencontres initiķes par de nouveaux personnages et d'autres que vous avez dķjÓ rencontrķs.
