[Description]
Mod-EN=This mod will add various clerical spells to wizard magic users via a new item, effectively turning them into previously unavailable X/Cleric kits/multiclass combinations. The semi-multi learns and uses spells as per a normal Arcane caster, and also has access to 35 clerical spells. It is not recommend to use "Semi Multi Clerics" with "Spell Revisions" as conceptually they are on opposite extremes. "Spell Revisions" is trying to "rebalance" spells, while that mod purposely makes them unbalancing again.
Mod-FR=Ce mod ajoute un marchand, reprķsentant de Mystra, qui vend un manuel de magie donnant accĶs Ó une trentaine de sorts divins, dont un inķdit. Seuls les lanceurs de sorts profanes peuvent en bķnķficier au prix de -2 en Force et Constitution. En d'autres termes, grŌce Ó ce mod, Ó vous les multi-classes ensorceleur(clerce), Skalde(clerc), guerrier/mage(clerc), entropiste(clerc), par exemple... et le trĶs fameux guerrier/mage/voleur(clerc). Vous le trouverez au nord du Marchķ de l'Aventurier sur la Promenade de Waukyne et dans l'Antichambre.
